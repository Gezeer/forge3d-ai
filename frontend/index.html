<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Forge3D AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050816;
      color: white;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 0 40px rgba(0, 255, 180, 0.12);
    }

    h1 {
      color: #22ffc3;
      margin-top: 0;
    }

    p {
      color: #9ca3af;
    }

    input, button {
      width: 100%;
      margin-top: 14px;
    }

    button {
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #22ffc3;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      margin-top: 16px;
      color: #facc15;
      word-break: break-word;
      white-space: pre-wrap;
    }

    a {
      display: block;
      margin-top: 16px;
      color: #22ffc3;
    }

    #viewer {
      width: 100%;
      height: calc(100vh - 48px);
      background: radial-gradient(circle at top, #132033, #050816);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forge3D AI</h1>
    <p>Envie uma imagem e gere um modelo 3D GLB.</p>

    <input type="file" id="file" accept="image/*" />
    <button onclick="generate3D()">Gerar 3D</button>

    <div class="status" id="status"></div>
    <a id="download" style="display:none;" download="model.glb">Baixar GLB</a>
  </div>

  <div id="viewer"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const viewer = document.getElementById("viewer");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050816);

    const camera = new THREE.PerspectiveCamera(
      45,
      viewer.clientWidth / viewer.clientHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const light1 = new THREE.DirectionalLight(0xffffff, 2);
    light1.position.set(2, 4, 3);
    scene.add(light1);

    const light2 = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(light2);

    const grid = new THREE.GridHelper(10, 10);
    scene.add(grid);

    let currentModel = null;

    function loadGLB(url) {
      const loader = new GLTFLoader();

      loader.load(
        url,
        (gltf) => {
          if (currentModel) {
            scene.remove(currentModel);
          }

          currentModel = gltf.scene;
          currentModel.scale.set(1.5, 1.5, 1.5);
          currentModel.position.set(0, 0, 0);
          scene.add(currentModel);
        },
        undefined,
        (error) => {
          document.getElementById("status").innerText =
            "GLB gerado, mas não consegui abrir no viewer. Use o botão baixar.";
          console.error(error);
        }
      );
    }

    window.generate3D = async function () {
      const fileInput = document.getElementById("file");
      const status = document.getElementById("status");
      const download = document.getElementById("download");

      if (!fileInput.files.length) {
        status.innerText = "Escolha uma imagem primeiro.";
        return;
      }

      status.innerText = "Gerando modelo 3D... aguarde.";
      download.style.display = "none";

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      const response = await fetch("http://127.0.0.1:8000/generate/image", {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (data.return_code !== 0) {
        status.innerText = "Erro ao gerar:\n" + data.stderr;
        return;
      }

      const glbUrl = "http://127.0.0.1:8000" + data.download_url;

      status.innerText = "Modelo gerado com sucesso!\nJob: " + data.job_id;
      download.href = glbUrl;
      download.style.display = "block";
      download.innerText = "Baixar modelo GLB";

      loadGLB(glbUrl);
    };

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      if (currentModel) {
        currentModel.rotation.y += 0.003;
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    });
  </script>
</body>
</html>
